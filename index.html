<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shatterproof</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="./static/css/styles.css">
</head>
<body>
    <div id="toast-wrapper"></div>
    <div id="alert-wrapper"></div>

    <div class="top-bar">
        <div class="title">HTTP Client</div>
    </div>

    <div class="wrapper">
        <div class="over-section">

        </div>
        <div class="center-bar">
            <select id="method">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
                <option value="PUT">PUT</option>
                <option value="DELETE">DELETE</option>
                <option value="PATCH">PATCH</option>
                <option value="HEAD">HEAD</option>
                <option value="OPTIONS">OPTIONS</option>
            </select>
            <input type="text" name="search" id="search" placeholder="google.com">
            <button id="go">Go</button>
        </div>
        <div class="options-box">
            <div class="query-box">
                <h3>Query Params</h3>
                <div class="option-list" id="query-list"></div>
                <button class="option-button" id="add-query"><i class="bi bi-plus"></i></button>
            </div>
            <div class="headers-box">
                <h3>Headers</h3>
                <div class="option-list" id="header-list"></div>
                <button class="option-button" id="add-header"><i class="bi bi-plus"></i></button>
            </div>
            <div class="body-box">
                <h3>Body</h3>
                <textarea name="body" id="body"></textarea>
            </div>
        </div>
        <div class="response-box closed">
            <div class="inline-flex">
                <h2>Response</h2>
                <button id="copy-response">Copy</button>
            </div>
            <div class="gap"></div>
            <div class="response-info">
                <div id="status"></div>
                <div id="content-type"></div>
            </div>
            <textarea name="response" id="response" readonly></textarea>
            <div id="pagination"></div>
        </div>
        <footer class="footer">
            (c) 2026 Cheng Yu Yang. Code licensed under the MIT License.
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./static/js/app.js" type="module"></script>
</body>
</html>
